# Evolution Simulation — Konfiguration
# Alle Felder sind optional; fehlende Werte werden aus DefaultConfig() übernommen.
# Starten mit: make run  (liest evolution.toml automatisch wenn vorhanden)

# --- Welt ---
world_width    = 200
world_height   = 200

# --- Population ---
max_population = 10000
initial_pop    = 500     # Gleichgewichtsnähe ~320 → kein Überschuss-Crash

ticks_per_second = 20

# --- Energie (Herbivore) ---
base_energy_cost        = 0.5
reproduction_threshold  = 100.0
reproduction_reserve    = 50.0

# --- Nahrung ---
regrowth_meadow = 0.002
regrowth_desert = 0.0005

# --- Verwüstung ---
desertify_threshold = 0.05
recover_threshold   = 0.50

# --- Räuber ---
[predator]
initial_predators = 18      # Puffer gegen stochastische Extinction ohne Überjagd
energy_per_kill   = 7.0     # moderat höher als 5.0 → überlebt Hungerperioden
repro_threshold   = 340.0   # nah am Original → langsames Wachstum, kein Populationsboom
repro_reserve     = 60.0    # Startenergie Räuber-Kind
max_sight         = 20      # 2× Herbivore-Sichtweite

# --- Gene ---
[[gene_definitions]]
key           = 0   # GeneSpeed
min           = 0.5
max           = 3.0
mutation_rate = 0.1
mutation_step = 0.1

[[gene_definitions]]
key           = 1   # GeneSight
min           = 1.0
max           = 10.0
mutation_rate = 0.1
mutation_step = 0.5

[[gene_definitions]]
key           = 2   # GeneEfficiency
min           = 0.5
max           = 2.0
mutation_rate = 0.05
mutation_step = 0.05

[[gene_definitions]]
key           = 3   # GeneAggression
min           = 0.0
max           = 1.0
mutation_rate = 0.05
mutation_step = 0.05
